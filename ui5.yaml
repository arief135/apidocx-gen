specVersion: "3.0"
metadata:
  name: id.apnv.apps.apidocxgen
type: application
framework:
  name: OpenUI5
  version: "1.148.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.tnt
    - name: sap.ui.layout
    - name: themelib_sap_horizon
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: false
        transpileAsync: true
        transpileTypeScript: true
        removeConsoleStatements: false
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
        debug: false
        transpileAsync: true
        transpileTypeScript: true
